services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: greenarena
      POSTGRES_PASSWORD: greenarena
      POSTGRES_DB: greenarena
    ports:
      - "5432:5432"
    volumes:
      - green_arena_pgdata:/var/lib/postgresql/data

volumes:
  green_arena_pgdata:
